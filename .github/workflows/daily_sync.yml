name: Daily Venue Timetable Sync

on:
  schedule:
    # 20:00 UTC = 04:00 SGT (next day). Runs daily.
    - cron: "0 20 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Parse NUSMods venue timetable
        run: python scripts/parse_nusmods.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/venues_timetable.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update venue timetable data"
            git push
          fi
